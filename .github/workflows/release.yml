name: Release

on:
  push:
    tags:
      - "*"

env:
  IMAGEMAGICK_WINDOWS_URL: https://imagemagick.org/archive/binaries/ImageMagick-7.1.2-25-Q16-HDRI-x64-dll.exe

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows-amd64:
    name: Build Windows amd64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 Qt5 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-imageformats
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-qt5-tools

      - name: Prepare ImageMagick runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $installer = Join-Path $env:RUNNER_TEMP 'imagemagick-dll.exe'
          $runtimeDir = Join-Path $env:GITHUB_WORKSPACE 'third_party/runtime/imagemagick'

          Invoke-WebRequest -Uri $env:IMAGEMAGICK_WINDOWS_URL -OutFile $installer

          if (Test-Path $runtimeDir) {
            Remove-Item -LiteralPath $runtimeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null

          $arguments = @(
            '/VERYSILENT',
            '/SUPPRESSMSGBOXES',
            '/NORESTART',
            '/SP-',
            "/DIR=`"$runtimeDir`""
          )
          $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "ImageMagick installer failed with exit code $($process.ExitCode)."
          }

          $requiredFiles = @(
            'CORE_RL_MagickWand_.dll',
            'CORE_RL_MagickCore_.dll',
            'CORE_RL_heif_.dll',
            'CORE_RL_webp_.dll',
            'modules/coders/IM_MOD_RL_heic_.dll',
            'modules/coders/IM_MOD_RL_webp_.dll'
          )
          foreach ($file in $requiredFiles) {
            $path = Join-Path $runtimeDir $file
            if (-not (Test-Path $path)) {
              throw "ImageMagick runtime is missing required file: $file"
            }
          }

          $dllCount = (Get-ChildItem -Path $runtimeDir -Filter 'CORE_RL_*.dll' -File | Measure-Object).Count
          $coderCount = (Get-ChildItem -Path (Join-Path $runtimeDir 'modules/coders') -Filter 'IM_MOD_RL_*.dll' -File | Measure-Object).Count
          Write-Host "Prepared ImageMagick runtime: $dllCount CORE_RL DLLs, $coderCount coder modules."

      - name: Configure
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENLIST_SORTER_QT_ROOT=/mingw64 \
            -DOPENLIST_SORTER_OPENSSL_ROOT=/mingw64/bin

      - name: Build
        run: cmake --build build-release --target openlist_sorter --parallel

      - name: Deploy Windows MinGW runtime dependencies
        run: |
          set -euo pipefail
          dist="build-release/dist"

          list_dependency_roots() {
            find "$dist" \
              -path "$dist/runtime/imagemagick" -prune -o \
              -iname 'libicudt*.dll' -prune -o \
              -type f \( -iname '*.exe' -o -iname '*.dll' \) -print
          }

          copy_dependency() {
            local dep="$1"
            case "$dep" in
              /mingw64/bin/*.dll|/ucrt64/bin/*.dll)
                ;;
              *)
                return 0
                ;;
            esac

            local target="$dist/$(basename "$dep")"
            if [ ! -f "$target" ]; then
              echo "Deploying Windows dependency $(basename "$dep")"
              cp -f "$dep" "$target"
              return 1
            fi
            return 0
          }

          for pass in $(seq 1 8); do
            added=0
            while IFS= read -r binary; do
              while IFS= read -r dep; do
                if ! copy_dependency "$dep"; then
                  added=1
                fi
              done < <(ldd "$binary" 2>/dev/null | awk '/=> \// { print $3 } /^\// { print $1 }')
            done < <(list_dependency_roots)
            [ "$added" -eq 0 ] && break
          done

          unresolved=()
          while IFS= read -r binary; do
            while IFS= read -r missing; do
              [ -n "$missing" ] && unresolved+=("$binary -> $missing")
            done < <(ldd "$binary" 2>/dev/null | awk '/not found/ { print $1 }')
          done < <(list_dependency_roots)

          if [ "${#unresolved[@]}" -gt 0 ]; then
            printf 'Unresolved Windows runtime dependencies:\n'
            printf '  %s\n' "${unresolved[@]}"
            exit 1
          fi

      - name: Validate Windows runtime
        run: |
          required_runtime_files=(
            OpenListSorter.exe
            libdouble-conversion.dll
            libpcre2-16-0.dll
            Qt5Core.dll
            Qt5Gui.dll
            Qt5Widgets.dll
            Qt5Network.dll
            Qt5Multimedia.dll
            Qt5MultimediaWidgets.dll
            Qt5Svg.dll
            Qt5Concurrent.dll
            platforms/qwindows.dll
            imageformats/qjpeg.dll
            imageformats/qwebp.dll
            iconengines/qsvgicon.dll
            runtime/imagemagick/CORE_RL_MagickWand_.dll
            runtime/imagemagick/CORE_RL_heif_.dll
            runtime/imagemagick/modules/coders/IM_MOD_RL_heic_.dll
            runtime/imagemagick/modules/coders/IM_MOD_RL_webp_.dll
          )
          for file in "${required_runtime_files[@]}"; do
            if [ ! -f "build-release/dist/${file}" ]; then
              echo "Missing Windows runtime file: ${file}"
              find build-release/dist -maxdepth 2 -type f | sort
              exit 1
            fi
          done

      - name: Package
        run: |
          package_name="OpenListSorter-windows-amd64"
          mkdir -p "artifacts/${package_name}"
          cp -a build-release/dist/. "artifacts/${package_name}/"
          (cd artifacts && cmake -E tar cfv "${package_name}.zip" --format=zip "${package_name}")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenListSorter-windows-amd64
          path: artifacts/OpenListSorter-windows-amd64.zip
          if-no-files-found: error

  build-linux-amd64:
    name: Build Linux amd64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            imagemagick \
            libgl1-mesa-dev \
            libheif1 \
            libmagickcore-6.q16-6-extra \
            libmagickwand-6.q16-6 \
            libpulse-dev \
            ninja-build \
            patchelf \
            python3-pip
          python3 -m pip install --user aqtinstall

      - name: Install Qt5
        run: |
          python3 -m aqt install-qt linux desktop 5.15.2 gcc_64 -O "$RUNNER_TEMP/Qt"
          echo "QT_ROOT=$RUNNER_TEMP/Qt/5.15.2/gcc_64" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENLIST_SORTER_QT_ROOT="$QT_ROOT"

      - name: Build
        run: cmake --build build-release --target openlist_sorter --parallel

      - name: Package
        run: |
          package_name="OpenListSorter-linux-amd64"
          package_dir="artifacts/${package_name}"
          mkdir -p "$package_dir"
          cp -a build-release/dist/. "$package_dir/"

          skip_system_dependency() {
            case "$(basename "$1")" in
              ld-linux*|linux-vdso*|libBrokenLocale.so.*|libanl.so.*|libc.so.*|libdl.so.*|libm.so.*|libmvec.so.*|libnsl.so.*|libnss_*|libpthread.so.*|libresolv.so.*|librt.so.*|libutil.so.*)
                return 0
                ;;
            esac
            return 1
          }

          copy_library_file_to() {
            local dest_dir="$1"
            local src="$2"
            [ -e "$src" ] || return 0
            local real
            real="$(readlink -f "$src")"
            mkdir -p "$dest_dir"
            local target="$dest_dir/$(basename "$src")"
            if [ "$(readlink -m "$src")" != "$(readlink -m "$target")" ]; then
              rm -f "$target"
              cp -L "$src" "$target"
            fi
            if [ "$(basename "$real")" != "$(basename "$src")" ]; then
              local real_target="$dest_dir/$(basename "$real")"
              if [ "$(readlink -m "$real")" != "$(readlink -m "$real_target")" ]; then
                rm -f "$real_target"
                cp -L "$real" "$real_target"
              fi
            fi
          }

          copy_library_tree_to() {
            local dest_dir="$1"
            shift
            local queue=("$@")
            local item real dep
            declare -A seen=()
            while [ "${#queue[@]}" -gt 0 ]; do
              item="${queue[0]}"
              queue=("${queue[@]:1}")
              [ -e "$item" ] || continue
              real="$(readlink -f "$item")"
              [ -n "${seen[$real]:-}" ] && continue
              seen[$real]=1
              if skip_system_dependency "$real"; then
                continue
              fi
              copy_library_file_to "$dest_dir" "$item"
              while IFS= read -r dep; do
                [ -n "$dep" ] && queue+=("$dep")
              done < <(ldd "$real" 2>/dev/null | awk '/=> \// { print $3 } /^\t\// { print $1 }')
            done
          }

          for plugin_dir in platforms imageformats iconengines mediaservice audio playlistformats; do
            if [ -d "$QT_ROOT/plugins/$plugin_dir" ]; then
              cp -a "$QT_ROOT/plugins/$plugin_dir" "$package_dir/"
            fi
          done

          mapfile -t qt_runtime_inputs < <(find "$package_dir" -type f \( -name 'OpenListSorter' -o -name '*.so' -o -name '*.so.*' \))
          copy_library_tree_to "$package_dir" "${qt_runtime_inputs[@]}"

          im_runtime="$package_dir/runtime/imagemagick"
          im_lib="$im_runtime/lib"
          im_config="$im_runtime/config"
          im_coders="$im_runtime/modules/coders"
          im_filters="$im_runtime/modules/filters"
          mkdir -p "$im_lib" "$im_config" "$im_coders" "$im_filters"

          find_ldconfig_library() {
            ldconfig -p | awk -v pattern="$1" '$1 ~ pattern { print $NF; exit }'
          }

          magick_wand_lib="$(find_ldconfig_library '^libMagickWand-.*\.so')"
          magick_core_lib="$(find_ldconfig_library '^libMagickCore-.*\.so')"
          heif_lib="$(find_ldconfig_library '^libheif\.so')"
          if [ -z "$magick_wand_lib" ] || [ -z "$magick_core_lib" ] || [ -z "$heif_lib" ]; then
            echo "Missing Linux ImageMagick/libheif runtime libraries."
            ldconfig -p | grep -E 'Magick(Wand|Core)|libheif' || true
            exit 1
          fi
          copy_library_tree_to "$im_lib" "$magick_wand_lib" "$magick_core_lib" "$heif_lib"

          for config_dir in /etc/ImageMagick-7 /etc/ImageMagick-6; do
            if [ -d "$config_dir" ]; then
              cp -a "$config_dir"/*.xml "$im_config/" 2>/dev/null || true
            fi
          done

          coder_dir="$(find /usr/lib /lib -type d -path '*ImageMagick*modules*coders' -print -quit 2>/dev/null || true)"
          if [ -z "$coder_dir" ]; then
            echo "Missing ImageMagick coder module directory."
            exit 1
          fi
          selected_coders=(
            bmp
            gif
            heic
            icon
            jpeg
            magick
            miff
            png
            pnm
            tga
            tiff
            webp
          )
          for coder in "${selected_coders[@]}"; do
            if [ -f "$coder_dir/${coder}.so" ]; then
              cp -a "$coder_dir/${coder}.so" "$im_coders/"
            fi
          done

          filter_dir="$(find /usr/lib /lib -type d -path '*ImageMagick*modules*filters' -print -quit 2>/dev/null || true)"
          if [ -n "$filter_dir" ]; then
            cp -a "$filter_dir"/*.so "$im_filters/" 2>/dev/null || true
          fi

          copy_library_tree_to "$im_lib" "$im_coders"/*.so "$im_filters"/*.so
          test -f "$im_coders/heic.so" || { echo "Missing ImageMagick heic coder module."; ls -la "$im_coders"; exit 1; }
          test -f "$im_coders/webp.so" || { echo "Missing ImageMagick webp coder module."; ls -la "$im_coders"; exit 1; }
          echo "Prepared Linux ImageMagick runtime: $(find "$im_lib" -maxdepth 1 -type f | wc -l) libraries, $(find "$im_coders" -maxdepth 1 -type f | wc -l) coder modules."

          cat > "$package_dir/OpenListSorter.sh" <<'EOF'
          #!/usr/bin/env bash
          set -e
          app_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$app_dir:$app_dir/runtime/imagemagick/lib:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="$app_dir"
          exec "$app_dir/OpenListSorter" "$@"
          EOF
          sed -i 's/^          //' "$package_dir/OpenListSorter.sh"
          chmod +x "$package_dir/OpenListSorter.sh"
          (cd artifacts && tar -czf "${package_name}.tar.gz" "${package_name}")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenListSorter-linux-amd64
          path: artifacts/OpenListSorter-linux-amd64.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
      - build-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ls -la release-assets
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --title "$TAG_NAME" \
              --generate-notes
          fi
